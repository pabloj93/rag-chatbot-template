server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: unknown paths get index.html so React Router can handle
    # them client-side. Without this, a hard-refresh on any non-root URL 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve assets with long-lived cache headers — Vite fingerprints asset
    # filenames, so stale cache is never an issue.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
